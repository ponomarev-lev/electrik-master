{% extends "layout.html" %}

{% block content %}
<h1>{% if mode == "edit" %}Редактирование сотрудника{% else %}Создание сотрудника{% endif %}</h1>

<form method="post" enctype="multipart/form-data">
  <p>
    <label for="last_name">Фамилия *</label><br>
    <input id="last_name" type="text" name="last_name" maxlength="100" value="{{ employee.get('last_name', '') }}">
  </p>
  <p>
    <label for="first_name">Имя *</label><br>
    <input id="first_name" type="text" name="first_name" maxlength="100" value="{{ employee.get('first_name', '') }}">
  </p>
  <p>
    <label for="middle_name">Отчество</label><br>
    <input id="middle_name" type="text" name="middle_name" maxlength="100" value="{{ employee.get('middle_name', '') }}">
  </p>
  <p>
    <label for="phone">Телефон *</label><br>
    <input id="phone" type="tel" name="phone" value="{{ employee.get('phone', '') }}">
  </p>
  <p>
    <label for="birth_date">Дата рождения *</label><br>
    <input id="birth_date" type="date" name="birth_date" value="{{ employee.get('birth_date', '') }}">
  </p>
  <p>
    <label for="sex">Пол *</label><br>
    <select id="sex" name="sex">
      <option value="">Выберите пол</option>
      <option value="male" {% if employee.get('sex') == 'male' %}selected{% endif %}>Мужской</option>
      <option value="female" {% if employee.get('sex') == 'female' %}selected{% endif %}>Женский</option>
    </select>
  </p>
  <p>
    <label for="photo">Фото</label><br>
    <input id="photo" type="file" name="photo" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp">
    <br>
    <small>Максимальный размер файла: 200 КБ</small>
  </p>

  <button type="submit">Сохранить</button>
  <a href="/employees">Отмена</a>
</form>
{% endblock %}
